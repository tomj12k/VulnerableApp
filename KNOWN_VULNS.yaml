# KNOWN_VULNS — ground-truth vulnerability catalog
# Purpose: answer key for benchmarking Scantonomous scan findings against this app.
# Diff scanner output vs. this file: a hit on a `vulnerable_source` path == true positive;
# a hit on a `secure_source` path == false positive.
#
# Schema per entry (benchmark variant — carries case-count fields):
#   id                    stable slug for this vuln class
#   category              vulnerability module
#   cwe                   primary CWE id(s), taken from the shipped VulnerabilityType enum
#   owasp                 OWASP Top 10 (2021) category
#   true_positive_count   number of vulnerable "level" endpoints in the module
#   false_positive_count  safe/hardened level count (0 = none isolated / unknown)
#   vulnerable_source     module source dir
#   ground_truth_file     shipped metadata source (enum + annotations)
#   notes                 context / caveats

app: VulnerableApp
full_name: SasanLabs VulnerableApp
upstream: https://github.com/SasanLabs/VulnerableApp
fork: https://github.com/tomj12k/VulnerableApp
language: Java
scan_surface: [SAST-java, DAST-web]
catalog_notes: >
  VulnerableApp ships its ground truth as code metadata, not a CSV. Each
  vulnerability module lives under src/main/java/org/sasanlabs/service/vulnerability/<module>/
  and exposes a set of graduated-difficulty "level" endpoints annotated with
  @VulnerableAppRequestMapping; most also carry @AttackVector annotations naming
  the exploited VulnerabilityType(s). CWE ids are taken from the shipped enum
  src/main/java/org/sasanlabs/vulnerability/types/VulnerabilityType.java, where
  each VulnerabilityType is constructed with its cweID (e.g. BLIND_SQL_INJECTION(89,19)).
  true_positive_count = number of @VulnerableAppRequestMapping endpoints in the
  module (counted with grep). VulnerableApp does not segregate its safe/hardened
  levels into a separate answer-key list, so false_positive_count is set to 0
  (not independently verifiable from shipped metadata) except where noted.

